<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startidea OS</title>
    <style>
      :root {
        --bg-1: #0b132b;
        --bg-2: #1c2541;
        --accent: #5bc0be;
        --text: #f4f4f8;
        --muted: #c9d6df;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(91, 192, 190, 0.25), transparent 40%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .card {
        width: min(900px, 92vw);
        padding: 2.5rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        backdrop-filter: blur(6px);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.65;
      }

      .status {
        margin-top: 1.2rem;
        display: inline-block;
        padding: 0.38rem 0.75rem;
        border-radius: 999px;
        font-size: 0.9rem;
        border: 1px solid rgba(91, 192, 190, 0.45);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Startidea OS</h1>
      <p>
        Base inicial desplegable en Coolify sobre VPS. Si ves esta pantalla, el pipeline de build y
        deployment ya funciona.
      </p>
      <span class="status">Estado: activo</span>
    </main>
  </body>
</html>
